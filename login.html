<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Entrar | Plataforma de Bolões</title>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<style>
  :root{
    --bg:#0f172a; --card:#0b1222; --fg:#e5e7eb; --muted:#8b98b8;
    --brand:#10b981; --danger:#ef4444; --accent:#38bdf8;
  }
  *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial}
  body{margin:0;background:var(--bg);color:var(--fg);display:grid;place-items:center;min-height:100vh}
  .wrap{width:min(920px,94vw);padding:24px}
  .card{background:var(--card);border-radius:16px;padding:20px 18px;box-shadow:0 8px 30px rgba(0,0,0,.35)}
  h1{margin:0 0 4px;font-size:1.5rem}
  p.muted{margin:.25rem 0 1rem;color:var(--muted)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .col{flex:1 1 260px}
  label{display:block;margin:.5rem 0 .25rem;color:var(--muted);font-size:.9rem}
  input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #1f2a44;background:#0a1328;color:#dbe2f7}
  input:focus{outline:none;border-color:var(--accent)}
  button{border:0;border-radius:12px;padding:12px 16px;cursor:pointer;font-weight:600}
  .btn{background:var(--brand);color:#052e2b}
  .btn:hover{filter:brightness(1.05)}
  .btn-ghost{background:#0a1328;color:#cfe3ff;border:1px solid #1f2a44}
  .btn-google{background:#ffffff;color:#111827}
  .stack{display:flex;flex-direction:column;gap:10px;margin-top:10px}
  .line{height:1px;background:#1f2a44;margin:14px 0}
  .status{margin-top:10px;font-size:.95rem}
  .ok{color:var(--brand)} .err{color:var(--danger)}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .pill{padding:6px 10px;border-radius:999px;background:#0a1328;border:1px solid #1f2a44;color:#a7b4d6;font-size:.85rem}
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Entrar na plataforma</h1>
      <span id="who" class="pill">desconectado</span>
    </div>

    <div class="card">
      <p class="muted">Use sua conta Google (1 clique) ou e-mail/senha. Após autenticar, seu cadastro é sincronizado com o Apps Script automaticamente.</p>

      <div class="row">
        <div class="col">
          <button id="btnGoogle" class="btn-google">Continuar com Google</button>
        </div>
        <div class="col">
          <div class="stack">
            <label for="email">E-mail</label>
            <input id="email" type="email" placeholder="voce@email.com">
            <label for="pass">Senha</label>
            <input id="pass" type="password" placeholder="••••••••">
            <div class="row">
              <button id="btnSignIn" class="btn" style="flex:1">Entrar</button>
              <button id="btnSignUp" class="btn-ghost" style="flex:1">Criar conta</button>
            </div>
          </div>
        </div>
      </div>

      <div class="line"></div>

      <div class="row">
        <button id="btnLogout" class="btn-ghost">Sair</button>
        <span id="msg" class="status"></span>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    /******************** CONFIGURE AQUI ********************/
    const FIREBASE_CONFIG = {
      apiKey:     "SUA_API_KEY",
      authDomain: "seu-projeto.firebaseapp.com",
      projectId:  "seu-projeto",
      appId:      "SUA_APP_ID",
    };
    // URL Web App implantado do seu Apps Script (Executar como você / Acesso: Qualquer pessoa)
    const GAS_URL = "https://script.google.com/macros/s/SEU_DEPLOY_ID/exec";
    /*******************************************************/

    // Inicializa Firebase
    firebase.initializeApp(FIREBASE_CONFIG);
    const auth = firebase.auth();

    // util UI
    const el = id => document.getElementById(id);
    const show = (txt, cls) => { const m=el('msg'); m.className='status '+(cls||''); m.textContent=txt; };

    // Dispara cadastro/eco no GAS e persiste no navegador
    async function syncWithGAS(user){
      try{
        const uid  = user.uid;
        const name = user.displayName || (user.email ? user.email.split('@')[0] : 'Visitante');
        // guarda para as outras páginas (home/bolao) seguirem usando
        localStorage.setItem('uid', uid);
        localStorage.setItem('nome', name);

        // chama signup (POST)
        const res = await fetch(GAS_URL + '?action=signup', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ uid, name })
        });
        const data = await res.json();
        if(!(data && data.ok)) throw new Error(data?.error || 'Falha no cadastro');
        show('Login OK e sincronizado ✅', 'ok');
        el('who').textContent = name + ' ('+uid.slice(0,6)+'…)';
      }catch(err){
        console.error(err);
        show('Erro ao sincronizar com o servidor: '+ err.message, 'err');
      }
    }

    // Observa mudanças de sessão
    auth.onAuthStateChanged(user=>{
      if(user){
        syncWithGAS(user);
      }else{
        el('who').textContent = 'desconectado';
        localStorage.removeItem('uid'); localStorage.removeItem('nome');
        show('Sessão encerrada', '');
      }
    });

    // Ações de UI
    el('btnGoogle').onclick = async () => {
      try{
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithPopup(provider);
      }catch(err){ show('Google login falhou: '+err.message, 'err'); }
    };
    el('btnSignIn').onclick = async () => {
      try{
        const email = el('email').value.trim(), pass = el('pass').value;
        await auth.signInWithEmailAndPassword(email, pass);
      }catch(err){ show('Erro ao entrar: '+err.message, 'err'); }
    };
    el('btnSignUp').onclick = async () => {
      try{
        const email = el('email').value.trim(), pass = el('pass').value;
        await auth.createUserWithEmailAndPassword(email, pass);
        show('Conta criada! Você já está logado.', 'ok');
      }catch(err){ show('Erro ao criar conta: '+err.message, 'err'); }
    };
    el('btnLogout').onclick = async () => {
      try{ await auth.signOut(); }catch(err){ show('Erro ao sair: '+err.message, 'err'); }
    };
  </script>
</body>
</html>
